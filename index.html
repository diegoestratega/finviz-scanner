<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Finviz Fundamentals & Performance Scanner</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Finviz Fundamentals &amp; Performance Scanner</h1>

    <div class="filters">

      <div class="filter-group">
        <label for="marketcap">Market Cap</label>
        <select id="marketcap">
          <option value="">Any</option>
          <option value="cap_midover">&gt; $2B</option>
          <option value="cap_largeover">&gt; $10B</option>
          <option value="cap_megaover">&gt; $200B</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="pe">P/E</label>
        <select id="pe">
          <option value="">Any</option>
          <option value="fa_pe_profitable">Profitable</option>
          <option value="fa_pe_u10">Under 10</option>
          <option value="fa_pe_u15">Under 15</option>
          <option value="fa_pe_u20">Under 20</option>
          <option value="fa_pe_u25">Under 25</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="fpe">Forward P/E</label>
        <select id="fpe">
          <option value="">Any</option>
          <option value="fa_fpe_profitable">Profitable</option>
          <option value="fa_fpe_u10">Under 10</option>
          <option value="fa_fpe_u15">Under 15</option>
          <option value="fa_fpe_u20">Under 20</option>
          <option value="fa_fpe_u25">Under 25</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="epsqoq">EPS Q/Q</label>
        <select id="epsqoq">
          <option value="">Any</option>
          <option value="fa_epsqoq_pos">Positive</option>
          <option value="fa_epsqoq_o10">&gt; 10%</option>
          <option value="fa_epsqoq_o25">&gt; 25%</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="salesqoq">Sales Q/Q</label>
        <select id="salesqoq">
          <option value="">Any</option>
          <option value="fa_salesqoq_pos">Positive</option>
          <option value="fa_salesqoq_o10">&gt; 10%</option>
          <option value="fa_salesqoq_o25">&gt; 25%</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="debteq">Debt/Equity</label>
        <select id="debteq">
          <option value="">Any</option>
          <option value="fa_debteq_low">Low</option>
          <option value="fa_debteq_u1">Under 1</option>
          <option value="fa_debteq_u0.5">Under 0.5</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="highlow52w">52W High/Low</label>
        <select id="highlow52w">
          <option value="">Any</option>
          <option value="ta_highlow52w_nl">New 52W Low</option>
          <option value="ta_highlow52w_a0to10p">0-10% above 52W Low</option>
          <option value="ta_highlow52w_a10to20p">10-20% above 52W Low</option>
        </select>
      </div>

      <div class="filter-group checkbox-group">
        <label>
          <input type="checkbox" id="optionable" />
          Optionable
        </label>
      </div>

    </div>

    <div class="sort-and-actions">
      <div class="sort-buttons">
        <button data-sort="perfmon" class="sort-btn">Sort by Perf Month ↑</button>
        <button data-sort="perfytd" class="sort-btn sort-btn-active">Sort by Perf YTD ↑</button>
        <button data-sort="perfyear" class="sort-btn">Sort by Perf Year ↑</button>
      </div>
      <div class="actions">
        <button id="runScanBtn">Run Scan</button>
      </div>
    </div>

    <div class="status-bar">
      <div id="loading" class="loading hidden">⏳ Loading...</div>
      <div id="resultCount" class="result-count">No results yet</div>
      <a id="finvizLink" href="#" target="_blank" class="finviz-link hidden">
        ↗ Open equivalent Finviz screener
      </a>
    </div>

    <div class="results">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Company</th>
            <th>Sector</th>
            <th>Industry</th>
            <th>Mkt Cap</th>
            <th>P/E</th>
            <th>Fwd P/E</th>
            <th>EPS Q/Q</th>
            <th>Sales Q/Q</th>
            <th>Debt/Eq</th>
            <th>52W High</th>
            <th>52W Low</th>
            <th>Perf Month</th>
            <th>Perf YTD</th>
            <th>Perf Year</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
